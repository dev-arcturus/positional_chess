name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust — engine-rs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine-rs/target
          key: cargo-${{ runner.os }}-${{ hashFiles('engine-rs/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # `cargo test --release` runs:
      #   - tests/motif_assertions.rs (unit guards for false positives,
      #     real tactical patterns, phase-aware verbs)
      #   - tests/precision_recall.rs (corpus harness with per-motif
      #     P/R thresholds — fails CI if precision < 0.80 or recall < 0.70
      #     on any motif with ≥3 corpus mentions)
      - name: cargo test
        run: cargo test --release

  client:
    name: Client — lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test --silent

      - name: Build
        run: npm run build
